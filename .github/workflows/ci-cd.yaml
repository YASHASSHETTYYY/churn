name: MLOps Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      model_trials:
        description: Number of Optuna trials to run
        required: false
        default: "5"
      publish_image:
        description: Push Docker image to GHCR
        required: false
        type: boolean
        default: false
      trigger_deploy:
        description: Call the deployment webhook after publishing
        required: false
        type: boolean
        default: false

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"
  DEFAULT_MODEL_TRIALS: "5"

jobs:
  data_validation:
    name: Validate Data
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate raw dataset schema
        run: python src/data/validate_data.py --config params.yaml

      - name: Upload data validation report
        uses: actions/upload-artifact@v4
        with:
          name: data-validation-report
          path: reports/data_validation.json

  quality_checks:
    name: Test And Lint
    runs-on: ubuntu-latest
    needs: data_validation

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint
        run: python -m flake8 --jobs 1 src tests dashboard app

      - name: Test
        run: python -m pytest -q tests

  train_model:
    name: Train Model
    runs-on: ubuntu-latest
    needs: [data_validation, quality_checks]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare training data
        run: |
          python src/data/load_data.py --config params.yaml
          python src/data/split_data.py --config params.yaml

      - name: Train optimized model
        run: |
          python src/models/train_model.py --config params.yaml --n-trials \
          ${{ github.event.inputs.model_trials || env.DEFAULT_MODEL_TRIALS }}

      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: |
            models/churn_model.joblib
            reports/model_metrics.json
            reports/best_params.json

  drift_monitoring:
    name: Monitor Drift
    runs-on: ubuntu-latest
    needs: train_model

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download model artifacts
        uses: actions/download-artifact@v4
        with:
          name: model-artifacts
          path: .

      - name: Prepare monitoring datasets
        run: |
          python src/data/load_data.py --config params.yaml
          python src/data/split_data.py --config params.yaml

      - name: Generate drift report
        run: python src/monitoring/drift_report.py --config params.yaml

      - name: Upload drift report
        uses: actions/upload-artifact@v4
        with:
          name: drift-report
          path: |
            reports/drift_report.html
            reports/drift_report.json

  build_image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [quality_checks, train_model, drift_monitoring]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build application image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: customer-churn:ci

  publish_image:
    name: Publish Image
    runs-on: ubuntu-latest
    needs: build_image
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image name
        id: image_meta
        run: echo "image_name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/customer-churn" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: >
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' &&
          github.event.inputs.publish_image == 'true')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push release image
        if: >
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' &&
          github.event.inputs.publish_image == 'true')
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.image_meta.outputs.image_name }}:${{ github.sha }}
            ${{ steps.image_meta.outputs.image_name }}:latest

      - name: Skip image publish for pull requests or disabled manual runs
        if: >
          !(
            (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
            (github.event_name == 'workflow_dispatch' &&
            github.event.inputs.publish_image == 'true')
          )
        run: echo "Image publishing is disabled for this event, so the job completes without pushing."

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: publish_image
    env:
      DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}

    steps:
      - name: Compute image name
        id: image_meta
        run: echo "image_name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/customer-churn" >> "$GITHUB_OUTPUT"

      - name: Trigger runtime deployment
        if: >
          (
            (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
            (github.event_name == 'workflow_dispatch' &&
            github.event.inputs.trigger_deploy == 'true')
          ) &&
          env.DEPLOY_WEBHOOK_URL != ''
        run: |
          curl -X POST "$DEPLOY_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"image\":\"${{ steps.image_meta.outputs.image_name }}:${{ github.sha }}\"}"

      - name: Skip deployment when webhook is not configured
        if: >
          (
            (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
            (github.event_name == 'workflow_dispatch' &&
            github.event.inputs.trigger_deploy == 'true')
          ) &&
          env.DEPLOY_WEBHOOK_URL == ''
        run: echo "DEPLOY_WEBHOOK_URL is not configured; skipping deploy."

      - name: Skip deployment for pull requests or disabled manual runs
        if: >
          !(
            (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
            (github.event_name == 'workflow_dispatch' &&
            github.event.inputs.trigger_deploy == 'true')
          )
        run: echo "Deployment is disabled for this event, so the job completes without calling the webhook."
