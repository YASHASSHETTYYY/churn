name: MLOps Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  PYTHON_VERSION: "3.11"
  MODEL_TRIALS: "5"
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/customer-churn

jobs:
  data-validation:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate raw dataset schema
        run: python src/data/validate_data.py --config params.yaml

      - name: Upload data validation report
        uses: actions/upload-artifact@v4
        with:
          name: data-validation-report
          path: reports/data_validation.json

  quality-checks:
    runs-on: ubuntu-latest
    needs: data-validation

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint
        run: python -m flake8 --jobs 1 src tests dashboard app.py

      - name: Test
        run: python -m pytest -q tests

  train-model:
    runs-on: ubuntu-latest
    needs: [data-validation, quality-checks]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare training data
        run: |
          python src/data/load_data.py --config params.yaml
          python src/data/split_data.py --config params.yaml

      - name: Train optimized model
        run: python src/models/train_model.py --config params.yaml --n-trials ${{ env.MODEL_TRIALS }}

      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: |
            models/churn_model.joblib
            reports/model_metrics.json
            reports/best_params.json

  drift-monitoring:
    runs-on: ubuntu-latest
    needs: train-model

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download model artifacts
        uses: actions/download-artifact@v4
        with:
          name: model-artifacts
          path: .

      - name: Prepare monitoring datasets
        run: |
          python src/data/load_data.py --config params.yaml
          python src/data/split_data.py --config params.yaml

      - name: Generate drift report
        run: python src/monitoring/drift_report.py --config params.yaml

      - name: Upload drift report
        uses: actions/upload-artifact@v4
        with:
          name: drift-report
          path: |
            reports/drift_report.html
            reports/drift_report.json

  build-image:
    runs-on: ubuntu-latest
    needs: [quality-checks, train-model, drift-monitoring]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build application image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: customer-churn:ci

  deploy:
    runs-on: ubuntu-latest
    needs: build-image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push release image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Trigger runtime deployment
        if: ${{ secrets.DEPLOY_WEBHOOK_URL != '' }}
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
        run: |
          curl -X POST "$DEPLOY_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"image\":\"${{ env.IMAGE_NAME }}:${{ github.sha }}\"}"
