name: CI-CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build training dataset
        run: |
          python src/data/load_data.py --config params.yaml
          python src/data/split_data.py --config params.yaml

      - name: Train optimized model
        run: python src/models/train_model.py --config params.yaml --n-trials 5

      - name: Generate drift report
        run: python src/monitoring/drift_report.py --config params.yaml

      - name: Lint
        run: flake8 src tests dashboard app.py

      - name: Test
        run: pytest -v

  docker-build:
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build application image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: customer-churn:ci
